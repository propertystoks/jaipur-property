<!DOCTYPE html>
<html>
<head>
  <title>PropertyStoks Pro</title>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f5f6fa;
    }

    .sidebar {
      width: 220px;
      background: #0a3d62;
      color: white;
      height: 100vh;
      padding: 20px;
      position: fixed;
    }

    .main {
      margin-left: 260px;
      flex: 1;
      padding: 20px;
    }

    .insights {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      min-width: 180px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .filters {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 14px;
      background: #0a3d62;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .cards {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    canvas {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    #map {
      height: 400px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .score {
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🏠 PropertyStoks</h2>
</div>

<div class="main">

  <h2>Jaipur Property Dashboard</h2>

  <div class="insights">
    <div class="box">
      Avg Price:
      <div id="avgPrice"></div>
    </div>

    <div class="box">
      Total Areas:
      <div id="totalAreas"></div>
    </div>

    <div class="box">
      Trend:
      <div id="marketTrend"></div>
    </div>
  </div>

  <div class="filters">
    <input id="search" placeholder="Search area">

    <input id="minPrice" placeholder="Min Price">

    <input id="maxPrice" placeholder="Max Price">

    <select id="trend">
      <option value="">All</option>
      <option value="up">Increasing</option>
      <option value="down">Decreasing</option>
    </select>

    <button onclick="applyFilters()">Apply</button>
  </div>

  <canvas id="chart"></canvas>

  <div id="map"></div>

  <div class="cards" id="results"></div>

</div>

<script>

let allData = [];
let chart;
let map;

// 🚀 LOAD DATA
async function loadData() {

  try {

    const res = await fetch("https://property-backend-pfil.onrender.com/api/area");

    const apiData = await res.json();

    allData = apiData.map(i => ({
      area: i.name,
      price: i.basePrice,
      trend: "up"
    }));

    update(allData);

  } catch (err) {
    console.error(err);
  }
}

// 🚀 UPDATE UI
function update(data) {

  show(data);

  insights(data);

  drawChart(data);

  loadMap(data);
}

// 🚀 SHOW CARDS
function show(data) {

  let html = "";

  data.forEach(i => {

    html += `
      <div class="card">

        <h3>${i.area}</h3>

        <div>💰 Price: ₹${i.price}</div>

        <div>📈 Trend: ${i.trend}</div>

        <div class="score">
          🧠 AI Score: ${calculateScore(i.price)}/10
        </div>

        <br>

        <button onclick="unlock('${i.area}')">
          🔒 Unlock Full Report (₹99)
        </button>

      </div>
    `;

  });

  document.getElementById("results").innerHTML = html;
}

// 🚀 AI SCORE
function calculateScore(price) {

  if (price >= 8000) return 9;

  if (price >= 6000) return 8;

  if (price >= 5000) return 7;

  if (price >= 4000) return 6;

  return 5;
}

// 🚀 INSIGHTS
function insights(data) {

  let total = 0;
  let up = 0;
  let down = 0;

  data.forEach(i => {

    total += i.price;

    i.trend === "up" ? up++ : down++;

  });

  document.getElementById("avgPrice").innerText =
    "₹" + Math.round(total / data.length);

  document.getElementById("totalAreas").innerText =
    data.length;

  document.getElementById("marketTrend").innerText =
    up > down ? "Growing" : "Falling";
}

// 🚀 CHART
function drawChart(data) {

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",

    data: {
      labels: data.map(i => i.area),

      datasets: [{
        label: "Price",
        data: data.map(i => i.price)
      }]
    }
  });
}

// 🚀 MAP
function loadMap(data) {

  if (!map) {

    map = L.map('map').setView([26.9124, 75.7873], 11);

    L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
    ).addTo(map);
  }

  data.forEach(i => {

    const coords = getCoords(i.area);

    if (coords) {

      L.marker(coords)
        .addTo(map)
        .bindPopup(`${i.area} - ₹${i.price}`);
    }
  });
}

// 🚀 COORDS
function getCoords(area) {

  const loc = {

    "vaishali nagar": [26.9115, 75.7406],

    "mansarovar": [26.8550, 75.7640],

    "jagatpura": [26.8440, 75.8230],

    "malviya nagar": [26.8500, 75.8100]
  };

  return loc[area.toLowerCase()];
}

// 🚀 FILTERS
function applyFilters() {

  const s =
    document.getElementById("search")
    .value.toLowerCase();

  const min =
    document.getElementById("minPrice").value;

  const max =
    document.getElementById("maxPrice").value;

  const t =
    document.getElementById("trend").value;

  const f = allData.filter(i =>

    i.area.toLowerCase().includes(s) &&

    (!min || i.price >= min) &&

    (!max || i.price <= max) &&

    (!t || i.trend === t)
  );

  update(f);
}

// 💳 PAYMENT
async function unlock(area) {

  try {

    const res = await fetch(
      "https://property-backend-pfil.onrender.com/create-order",
      {
        method: "POST"
      }
    );

    const order = await res.json();

    const options = {

      key: "rzp_test_SkNACMV47PKF0S",

      amount: order.amount,

      currency: "INR",

      name: "PropertyStoks",

      description: "Premium Report",

      order_id: order.id,

      handler: function () {

        alert("Payment Successful ✅");

        showReport(area);
      }
    };

    const rzp = new Razorpay(options);

    rzp.open();

  } catch (err) {

    console.error(err);

    alert("Payment failed");
  }
}

// 📊 REPORT
function showReport(area) {

  alert(
    "📊 Premium Report: " + area +

    "\n\n- Expected Growth: High 📈" +

    "\n- Investment Score: " +
    calculateScore(6000) + "/10" +

    "\n- Best Time: Next 6 months"
  );
}

// 🚀 START
loadData();

</script>

</body>
</html>
