<!DOCTYPE html>
<html>
<head>
  <title>PropertyStoks Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      background: #0a3d62;
      color: white;
      height: 100vh;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .sidebar div {
      margin: 10px 0;
      cursor: pointer;
    }

    /* MAIN */
    .main {
      flex: 1;
      background: #f5f6fa;
      padding: 20px;
    }

    .top {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .insights {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      min-width: 150px;
    }

    .filters {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      background: #0a3d62;
      color: white;
      border: none;
      cursor: pointer;
    }

    .cards {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    .price {
      font-size: 18px;
      color: green;
    }

    canvas {
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>PropertyStoks</h2>
  <div>Dashboard</div>
  <div>Insights</div>
  <div>Analytics</div>
</div>

<div class="main">

  <div class="top">Jaipur Property Dashboard</div>

  <div class="insights">
    <div class="box">Avg Price: <div id="avgPrice"></div></div>
    <div class="box">Total Areas: <div id="totalAreas"></div></div>
    <div class="box">Trend: <div id="marketTrend"></div></div>
  </div>

  <div class="filters">
    <input id="search" placeholder="Search area">
    <input id="minPrice" placeholder="Min Price">
    <input id="maxPrice" placeholder="Max Price">

    <select id="trend">
      <option value="">All</option>
      <option value="up">Increasing</option>
      <option value="down">Decreasing</option>
    </select>

    <button onclick="applyFilters()">Apply</button>
  </div>

  <canvas id="chart"></canvas>

  <div class="cards" id="results"></div>

</div>

<script>
let allData = [];
let chart;

async function loadData() {
  const res = await fetch("https://property-backend-pfil.onrender.com/data");
  allData = await res.json();
  update(allData);
}

function update(data) {
  show(data);
  insights(data);
  draw(data);
}

function show(data) {
  let html = "";
  data.forEach(i => {
    html += `
      <div class="card">
        <h3>${i.area}</h3>
        <div class="price">₹${i.price}</div>
        <div>${i.trend}</div>
      </div>
    `;
  });
  document.getElementById("results").innerHTML = html;
}

function insights(data) {
  let total = 0, up = 0, down = 0;
  data.forEach(i => {
    total += i.price;
    i.trend === "up" ? up++ : down++;
  });

  document.getElementById("avgPrice").innerText = "₹" + Math.round(total/data.length);
  document.getElementById("totalAreas").innerText = data.length;
  document.getElementById("marketTrend").innerText = up > down ? "Growing" : "Falling";
}

function draw(data) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(i => i.area),
      datasets: [{ label: "Price", data: data.map(i => i.price) }]
    }
  });
}

function applyFilters() {
  const s = document.getElementById("search").value.toLowerCase();
  const min = document.getElementById("minPrice").value;
  const max = document.getElementById("maxPrice").value;
  const t = document.getElementById("trend").value;

  const f = allData.filter(i =>
    i.area.toLowerCase().includes(s) &&
    (!min || i.price >= min) &&
    (!max || i.price <= max) &&
    (!t || i.trend === t)
  );

  update(f);
}

loadData();
</script>

</body>
</html>
