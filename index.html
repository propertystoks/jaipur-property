<!DOCTYPE html>
<html>
<head>
  <title>Jaipur Property Insights</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      color: blue;
    }

    input {
      padding: 10px;
      width: 200px;
      margin-right: 10px;
    }

    button {
      padding: 10px;
    }

    #results {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>Find Property Rates in Jaipur</h1>

<input type="text" id="search" placeholder="Enter area name">
<button onclick="searchData()">Search</button>

<div id="results"></div>

<script>
let allData = [];

// 🔹 Load data from backend
async function loadData() {
  try {
    const res = await fetch("https://property-backend-pfil.onrender.com/data");
    allData = await res.json();
    showData(allData);
  } catch (error) {
    document.getElementById("results").innerHTML = "Error loading data";
  }
}

// 🔹 Show data
function showData(data) {
  let output = "";

  if (data.length === 0) {
    output = "No data available";
  } else {
    data.forEach(item => {
      output += `<p><b>${item.area}</b> - ₹${item.price}/sq ft (${item.trend})</p>`;
    });
  }

  document.getElementById("results").innerHTML = output;
}

// 🔹 Search function
function searchData() {
  const searchValue = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(item =>
    item.area.toLowerCase().includes(searchValue)
  );

  showData(filtered);
}

// 🔹 Load on start
loadData();
</script>

</body>
</html>
