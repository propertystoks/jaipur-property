<!DOCTYPE html>
<html>

<head>
  <title>EstateQuant AI</title>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>

    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #f5f6fa;
    }

    .sidebar {
      width: 220px;
      background: #0a3d62;
      color: white;
      height: 100vh;
      padding: 20px;
      position: fixed;
    }

    .main {
      margin-left: 260px;
      flex: 1;
      padding: 20px;
    }

    .insights {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 12px;
      min-width: 180px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.08);
    }

    .filters {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 14px;
      background: #0a3d62;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .cards {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 14px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    canvas {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    #map {
      height: 400px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .score {
      font-weight: bold;
      color: green;
      margin-top: 10px;
      font-size: 17px;
    }

    .premium {
      color: #0a7d2c;
      font-weight: bold;
      margin-top: 10px;
    }

    .reason {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
      line-height: 1.5;
    }

    .growth {
      margin-top: 12px;
      font-weight: bold;
      color: #0a3d62;
    }

  </style>

</head>

<body>

<div class="sidebar">

  <h2>🏠 EstateQuant AI</h2>

</div>

<div class="main">

  <h2>Jaipur Real Estate Intelligence Platform</h2>

  <p style="color:gray; margin-top:-10px;">
    AI-powered investment intelligence for smarter property decisions
  </p>

  <div class="insights">

    <div class="box">
      Avg Price:
      <div id="avgPrice"></div>
    </div>

    <div class="box">
      Total Areas:
      <div id="totalAreas"></div>
    </div>

    <div class="box">
      Trend:
      <div id="marketTrend"></div>
    </div>

  </div>

  <div class="filters">

    <input id="search" placeholder="Search area">

    <input id="minPrice" placeholder="Min Price">

    <input id="maxPrice" placeholder="Max Price">

    <select id="trend">

      <option value="">All</option>

      <option value="up">Increasing</option>

      <option value="down">Decreasing</option>

    </select>

    <button onclick="applyFilters()">
      Apply
    </button>

  </div>

  <canvas id="chart"></canvas>

  <div id="map"></div>

  <div class="cards" id="results"></div>

</div>

<script>

let allData = [];

let chart;

let map;

// LOAD DATA
async function loadData() {

  try {

    const res = await fetch(
      "https://property-backend-pfil.onrender.com/api/area"
    );

    const apiData = await res.json();

    allData = apiData.map(i => ({

      area: i.name,

      city: i.city,

      price: i.basePrice,

      trend: "up",

      connectivityScore: i.connectivityScore || 0,

      infrastructureScore: i.infrastructureScore || 0,

      demandScore: i.demandScore || 0,

      developmentScore: i.developmentScore || 0,

      livabilityScore: i.livabilityScore || 0

    }));

    update(allData);

  } catch (err) {

    console.error(err);

  }
}

// UPDATE
function update(data) {

  show(data);

  insights(data);

  drawChart(data);

  loadMap(data);
}

// AI SCORE
function calculateScore(area) {

  const total =

    area.connectivityScore +

    area.infrastructureScore +

    area.demandScore +

    area.developmentScore +

    area.livabilityScore;

  return (total / 10).toFixed(1);
}

// LABEL
function getPremiumLabel(score) {

  if (score >= 8)
    return "🟢 Premium Investment Zone";

  if (score >= 6)
    return "🟡 Emerging Growth Zone";

  return "🔴 High Risk Zone";
}

// REASON ENGINE
function getReason(area) {

  let reasons = [];

  if (area.connectivityScore >= 18)
    reasons.push("Excellent Connectivity");

  if (area.infrastructureScore >= 15)
    reasons.push("Strong Infrastructure");

  if (area.demandScore >= 20)
    reasons.push("High Buyer Demand");

  if (area.developmentScore >= 10)
    reasons.push("Future Growth Potential");

  if (area.livabilityScore >= 10)
    reasons.push("Good Livability");

  return reasons.join(", ");
}

// SHOW CARDS
function show(data) {

  let html = "";

  data.forEach(i => {

    const aiScore = calculateScore(i);

    html += `

      <div class="card">

        <h3>${i.area}</h3>

        <div>📍 ${i.city}</div>

        <br>

        <div>💰 Price: ₹${i.price}</div>

        <div>📈 Trend: ${i.trend}</div>

        <div class="score">
          🧠 AI Score: ${aiScore}/10
        </div>

        <div class="premium">
          ${getPremiumLabel(aiScore)}
        </div>

        <div class="reason">
          ${getReason(i)}
        </div>

        <div class="growth">
          🚀 Growth Potential:
          ${aiScore >= 8 ? "Very High" :
            aiScore >= 6 ? "Moderate" :
            "Low"}
        </div>

        <br>

        <button onclick="unlock('${i.area}')">
          🔒 Unlock Full Report (₹99)
        </button>

      </div>

    `;

  });

  document.getElementById("results").innerHTML = html;
}

// INSIGHTS
function insights(data) {

  let total = 0;

  let up = 0;

  let down = 0;

  data.forEach(i => {

    total += i.price;

    i.trend === "up" ? up++ : down++;

  });

  document.getElementById("avgPrice").innerText =
    "₹" + Math.round(total / data.length);

  document.getElementById("totalAreas").innerText =
    data.length;

  document.getElementById("marketTrend").innerText =
    up > down ? "Growing" : "Falling";
}

// CHART
function drawChart(data) {

  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {

    type: "bar",

    data: {

      labels: data.map(i => i.area),

      datasets: [{

        label: "Price",

        data: data.map(i => i.price)

      }]
    }
  });
}

// MAP
function loadMap(data) {

  if (!map) {

    map = L.map('map').setView([26.9124, 75.7873], 11);

    L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
    ).addTo(map);
  }

  data.forEach(i => {

    const coords = getCoords(i.area);

    if (coords) {

      L.marker(coords)
        .addTo(map)
        .bindPopup(`${i.area} - ₹${i.price}`);
    }
  });
}

// COORDS
function getCoords(area) {

  const loc = {

    "vaishali nagar": [26.9115, 75.7406],

    "mansarovar": [26.8550, 75.7640],

    "jagatpura": [26.8440, 75.8230],

    "malviya nagar": [26.8500, 75.8100]
  };

  return loc[area.toLowerCase()];
}

// FILTERS
function applyFilters() {

  const s =
    document.getElementById("search")
    .value.toLowerCase();

  const min =
    document.getElementById("minPrice").value;

  const max =
    document.getElementById("maxPrice").value;

  const t =
    document.getElementById("trend").value;

  const f = allData.filter(i =>

    i.area.toLowerCase().includes(s) &&

    (!min || i.price >= min) &&

    (!max || i.price <= max) &&

    (!t || i.trend === t)
  );

  update(f);
}

// PAYMENT
async function unlock(area) {

  try {

    const res = await fetch(
      "https://property-backend-pfil.onrender.com/create-order",
      {
        method: "POST"
      }
    );

    const order = await res.json();

    const options = {

      key: "rzp_test_SkNACMV47PKF0S",

      amount: order.amount,

      currency: "INR",

      name: "EstateQuant AI",

      description: "Premium Intelligence Report",

      order_id: order.id,

      handler: function () {

        alert("Payment Successful ✅");

        showReport(area);
      }
    };

    const rzp = new Razorpay(options);

    rzp.open();

  } catch (err) {

    console.error(err);

    alert("Payment failed");
  }
}

// REPORT
function showReport(area) {

  alert(

    "📊 EstateQuant AI Report: " + area +

    "\n\n- Expected Growth: High 📈" +

    "\n- Investment Score: Strong" +

    "\n- Future Appreciation: Positive" +

    "\n- Investor Confidence: High" +

    "\n- Best Time to Invest: Next 6 months"
  );
}

// START
loadData();

</script>

</body>
</html>
