<html><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252"><title>Jaipur Property Insights</title></head><body style="font-family:Arial;text-align:center;"><h1>Jaipur Property Insights</h1><input type="text" id="search" placeholder="Search area..." style="padding:10px;width:250px;"><div id="results"><p>Vaishali Nagar - ₹5200/sq ft</p><p>Mansarovar - ₹4800/sq ft</p><p>Jagatpura - ₹4200/sq ft</p></div><script>const data=[{area:"Vaishali Nagar",price:5200},{area:"Mansarovar",price:4800},{area:"Jagatpura",price:4200}];function showData(list){let output="";list.forEach(item=>{output+=`<p>${item.area} - ₹${item.price}/sq ft</p>`;});document.getElementById("results").innerHTML=output;}document.getElementById("search").addEventListener("input",function(){const value=this.value.toLowerCase();const filtered=data.filter(d=>d.area.toLowerCase().includes(value));showData(filtered);});showData(data);</script></body></html>
