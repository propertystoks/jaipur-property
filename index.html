<!DOCTYPE html>
<html>
<head>
  <title>PropertyStoks</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      margin: 0;
    }

    header {
      background: #0a3d62;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      padding: 20px;
    }

    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      background: #0a3d62;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .price {
      font-size: 20px;
      font-weight: bold;
      color: #27ae60;
    }

    .trend-up { color: green; }
    .trend-down { color: red; }

    .insights {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    canvas {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  PropertyStoks - Jaipur Property Rates
</header>

<!-- INSIGHTS -->
<div class="insights">
  <div class="box">
    <b>Avg Price</b>
    <div id="avgPrice">-</div>
  </div>

  <div class="box">
    <b>Total Areas</b>
    <div id="totalAreas">-</div>
  </div>

  <div class="box">
    <b>Market Trend</b>
    <div id="marketTrend">-</div>
  </div>
</div>

<div class="container">

  <!-- FILTERS -->
  <div class="filters">
    <input type="text" id="search" placeholder="Search area">
    <input type="number" id="minPrice" placeholder="Min Price">
    <input type="number" id="maxPrice" placeholder="Max Price">

    <select id="trend">
      <option value="">All Trends</option>
      <option value="up">Increasing</option>
      <option value="down">Decreasing</option>
    </select>

    <button onclick="applyFilters()">Apply</button>
  </div>

  <!-- CHART -->
  <canvas id="priceChart"></canvas>

  <!-- RESULTS -->
  <div class="cards" id="results"></div>

</div>

<script>
let allData = [];
let chartInstance = null;

// LOAD DATA
async function loadData() {
  const res = await fetch("https://property-backend-pfil.onrender.com/data");
  allData = await res.json();

  showData(allData);
  calculateInsights(allData);
  drawChart(allData);
}

// SHOW DATA
function showData(data) {
  let output = "";

  if (data.length === 0) {
    output = "No results found";
  } else {
    data.forEach(item => {
      output += `
        <div class="card">
          <h3>${item.area}</h3>
          <div class="price">₹${item.price}/sq ft</div>
          <div class="${item.trend === 'up' ? 'trend-up' : 'trend-down'}">
            ${item.trend === 'up' ? 'Increasing 📈' : 'Decreasing 📉'}
          </div>
        </div>
      `;
    });
  }

  document.getElementById("results").innerHTML = output;
}

// FILTER
function applyFilters() {
  const search = document.getElementById("search").value.toLowerCase();
  const min = document.getElementById("minPrice").value;
  const max = document.getElementById("maxPrice").value;
  const trend = document.getElementById("trend").value;

  let filtered = allData.filter(item => {
    return (
      item.area.toLowerCase().includes(search) &&
      (!min || item.price >= min) &&
      (!max || item.price <= max) &&
      (!trend || item.trend === trend)
    );
  });

  showData(filtered);
  calculateInsights(filtered);
  drawChart(filtered);
}

// INSIGHTS
function calculateInsights(data) {
  if (data.length === 0) return;

  let total = 0, up = 0, down = 0;

  data.forEach(item => {
    total += item.price;
    item.trend === "up" ? up++ : down++;
  });

  const avg = Math.round(total / data.length);

  document.getElementById("avgPrice").innerText = "₹" + avg;
  document.getElementById("totalAreas").innerText = data.length;
  document.getElementById("marketTrend").innerText =
    up > down ? "Growing 📈" : "Falling 📉";
}

// CHART
function drawChart(data) {
  const labels = data.map(i => i.area);
  const prices = data.map(i => i.price);

  if (chartInstance) {
    chartInstance.destroy(); // FIX overlap
  }

  const ctx = document.getElementById("priceChart");

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Price per sq ft',
        data: prices
      }]
    }
  });
}

// START
loadData();
</script>

</body>
</html>
