<!DOCTYPE html>
<html>
<head>
  <title>PropertyStoks Pro</title>
<div id="areas"></div>
  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <style>
    body { margin:0; font-family: Arial; display:flex; }

    .sidebar {
      width:220px; background:#0a3d62; color:white;
      height:100vh; padding:20px;
    }

    .main {
      flex:1; background:#f5f6fa; padding:20px;
    }

    .insights { display:flex; gap:20px; flex-wrap:wrap; }

    .box {
      background:white; padding:15px;
      border-radius:10px;
    }

    .filters {
      margin-top:20px;
      display:flex; gap:10px; flex-wrap:wrap;
    }

    input, select {
      padding:10px; border-radius:5px;
      border:1px solid #ccc;
    }

    button {
      padding:8px 12px;
      background:#0a3d62;
      color:white;
      border:none;
      cursor:pointer;
      margin-top:5px;
    }

    .cards {
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card {
      background:white;
      padding:15px;
      border-radius:10px;
    }

    canvas {
      margin-top:20px;
      background:white;
      padding:10px;
      border-radius:10px;
    }

    #map {
      height:400px;
      margin-top:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>PropertyStoks</h2>
</div>

<div class="main">

  <h2>Jaipur Property Dashboard</h2>

  <div class="insights">
    <div class="box">Avg Price: <div id="avgPrice"></div></div>
    <div class="box">Total Areas: <div id="totalAreas"></div></div>
    <div class="box">Trend: <div id="marketTrend"></div></div>
  </div>

  <div class="filters">
    <input id="search" placeholder="Search area">
    <input id="minPrice" placeholder="Min Price">
    <input id="maxPrice" placeholder="Max Price">

    <select id="trend">
      <option value="">All</option>
      <option value="up">Increasing</option>
      <option value="down">Decreasing</option>
    </select>

    <button onclick="applyFilters()">Apply</button>
  </div>

  <canvas id="chart"></canvas>

  <div id="map"></div>

  <div class="cards" id="results"></div>

</div>

<script>
let allData = [];
let chart;
let map;

// LOAD DATA
async function loadData() {
  const res = await fetch("https://property-backend-pfil.onrender.com/data");
  allData = await res.json();
  update(allData);
}

// UPDATE
function update(data) {
  show(data);
  insights(data);
  drawChart(data);
  loadMap(data);
}

// SHOW CARDS
function show(data) {
  let html = "";
  data.forEach(i => {
    html += `
      <div class="card">
        <h3>${i.area}</h3>
        <div>₹${i.price}</div>
        <div>${i.trend}</div>

        <button onclick="unlock('${i.area}')">
          🔒 Unlock Full Report (₹99)
        </button>
      </div>
    `;
  });
  document.getElementById("results").innerHTML = html;
}

// INSIGHTS
function insights(data) {
  let total = 0, up = 0, down = 0;

  data.forEach(i => {
    total += i.price;
    i.trend === "up" ? up++ : down++;
  });

  document.getElementById("avgPrice").innerText = "₹" + Math.round(total/data.length);
  document.getElementById("totalAreas").innerText = data.length;
  document.getElementById("marketTrend").innerText = up > down ? "Growing" : "Falling";
}

// CHART
function drawChart(data) {
  const ctx = document.getElementById("chart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(i => i.area),
      datasets: [{ label: "Price", data: data.map(i => i.price) }]
    }
  });
}

// MAP
function loadMap(data) {
  if (!map) {
    map = L.map('map').setView([26.9124, 75.7873], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(map);
  }

  data.forEach(i => {
    const coords = getCoords(i.area);
    if (coords) {
      L.marker(coords)
        .addTo(map)
        .bindPopup(`${i.area} - ₹${i.price}`);
    }
  });
}

// COORDINATES
function getCoords(area) {
  const loc = {
    "vaishali nagar": [26.9115, 75.7406],
    "mansarovar": [26.8550, 75.7640],
    "jagatpura": [26.8440, 75.8230],
    "malviya nagar": [26.8500, 75.8100]
  };
  return loc[area.toLowerCase()];
}

// FILTER
function applyFilters() {
  const s = document.getElementById("search").value.toLowerCase();
  const min = document.getElementById("minPrice").value;
  const max = document.getElementById("maxPrice").value;
  const t = document.getElementById("trend").value;

  const f = allData.filter(i =>
    i.area.toLowerCase().includes(s) &&
    (!min || i.price >= min) &&
    (!max || i.price <= max) &&
    (!t || i.trend === t)
  );

  update(f);
}

// 💳 PAYMENT WITH UPI ENABLED
async function unlock(area) {

  const res = await fetch("https://property-backend-pfil.onrender.com/create-order", {
    method: "POST"
  });

  const order = await res.json();

  const options = {
    key: "rzp_test_SkNACMV47PKF0S",
    amount: order.amount,
    currency: "INR",
    name: "PropertyStoks",
    description: "Premium Report",
    order_id: order.id,

    handler: function () {
      alert("Payment Successful ✅");
      showReport(area);
    },

    theme: {
      color: "#0a3d62"
    },

    method: {
      upi: true,
      card: true,
      netbanking: true,
      wallet: true
    }
  };

  const rzp = new Razorpay(options);
  rzp.open();<script>
async function loadAreas() {
  try {
    const res = await fetch("https://property-backend-pfil.onrender.com/api/area");
    const data = await res.json();

    const container = document.getElementById("areas");

    container.innerHTML = data.map(area => `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>${area.name}</h3>
        <p>City: ${area.city}</p>
        <p>Price: ₹${area.basePrice}</p>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
  }
}

loadAreas();
</script>
}

// PREMIUM REPORT
function showReport(area) {
  alert(
    "📊 Premium Report: " + area +
    "\n\n- Expected Growth: High 📈" +
    "\n- Investment Score: 8/10" +
    "\n- Best Time: Next 6 months"
  );
}

// START
loadData();
</script>

</body>
</html>
