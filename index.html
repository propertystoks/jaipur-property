<!DOCTYPE html>
<html>
<head>
  <title>Jaipur Property Insights</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6f8;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h2 {
      margin: 0;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      width: 260px;
      margin: 10px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      margin: 10px 0;
    }

    .trend-up { color: green; }
    .trend-down { color: red; }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 20px;
      background: #eee;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h2>Jaipur Property Insights</h2>
  <div>Market Trends</div>
</header>

<div class="filters">
  <input type="text" id="search" placeholder="Search area...">
  
  <select id="budget">
    <option value="">All Budget</option>
    <option value="4000">Below ₹4000</option>
    <option value="5000">₹4000 - ₹5000</option>
    <option value="6000">Above ₹5000</option>
  </select>
</div>

<div class="container" id="results"></div>

<footer>
  © 2026 Jaipur Property Insights | Data is indicative
</footer>

<script>
const data = [
  {area:"Vaishali Nagar", price:5200, trend:"up"},
  {area:"Mansarovar", price:4800, trend:"up"},
  {area:"Jagatpura", price:4200, trend:"down"},
  {area:"Malviya Nagar", price:6000, trend:"up"},
  {area:"Tonk Road", price:4500, trend:"down"},
  {area:"Ajmer Road", price:4000, trend:"up"},
  {area:"Bani Park", price:5500, trend:"up"},
  {area:"Sitapura", price:3800, trend:"down"}
];

function filterData() {
  const search = document.getElementById("search").value.toLowerCase();
  const budget = document.getElementById("budget").value;

  let filtered = data.filter(d => d.area.toLowerCase().includes(search));

  if (budget === "4000") {
    filtered = filtered.filter(d => d.price < 4000);
  } else if (budget === "5000") {
    filtered = filtered.filter(d => d.price >= 4000 && d.price <= 5000);
  } else if (budget === "6000") {
    filtered = filtered.filter(d => d.price > 5000);
  }

  showData(filtered);
}

function showData(list){
  let output = "";
  list.forEach(item => {
    output += `
      <div class="card">
        <h3>${item.area}</h3>
        <div class="price">₹${item.price}/sq ft</div>
        <div class="${item.trend === 'up' ? 'trend-up' : 'trend-down'}">
          ${item.trend === 'up' ? '⬆ Increasing' : '⬇ Decreasing'}
        </div>
      </div>
    `;
  });
  document.getElementById("results").innerHTML = output;
}

document.getElementById("search").addEventListener("input", filterData);
document.getElementById("budget").addEventListener("change", filterData);

showData(data);
</script>

</body>
</html>
