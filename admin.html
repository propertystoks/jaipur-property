<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      text-align: center;
      margin-top: 50px;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      width: 200px;
    }

    button {
      padding: 10px;
      background: #0a3d62;
      color: white;
      border: none;
      cursor: pointer;
    }

    .box {
      background: white;
      padding: 20px;
      display: inline-block;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div id="loginBox" class="box">
  <h2>Admin Login</h2>
  <input id="username" placeholder="Username"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel" class="box" style="display:none;">
  <h2>Add Property Data</h2>

  <input id="area" placeholder="Area"><br>
  <input id="price" placeholder="Price"><br>

  <select id="trend">
    <option value="up">Increasing</option>
    <option value="down">Decreasing</option>
  </select><br>

  <button onclick="addData()">Add</button>
</div>

<script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "admin" && pass === "admin123") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("Wrong credentials");
  }
}

async function addData() {
  const area = document.getElementById("area").value;
  const price = document.getElementById("price").value;
  const trend = document.getElementById("trend").value;

  if (!area || !price) {
    alert("Fill all fields");
    return;
  }

  await fetch("https://property-backend-pfil.onrender.com/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ area, price, trend })
  });

  alert("Data Added ✅");
}
</script>

</body>
</html>
