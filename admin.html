<!DOCTYPE html>
<html>

<head>
  <title>EstateQuant AI - Admin Panel</title>

  <style>

    body {
      font-family: Arial;
      background: #f5f6fa;
      padding: 30px;
    }

    h1 {
      color: #0a3d62;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      margin-top: 15px;
      padding: 12px;
      width: 100%;
      background: #0a3d62;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .delete-btn {
      background: #c0392b;
      margin-top: 10px;
    }

    .success {
      margin-top: 20px;
      font-weight: bold;
      font-size: 15px;
    }

    .areas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

  </style>
</head>

<body>

<h1>🏠 EstateQuant AI - Admin Panel</h1>

<div class="box">

  <input id="name" placeholder="Area Name">

  <input id="city" placeholder="City">

  <input id="basePrice" placeholder="Base Price">

  <input id="connectivityScore" placeholder="Connectivity Score">

  <input id="infrastructureScore" placeholder="Infrastructure Score">

  <input id="demandScore" placeholder="Demand Score">

  <input id="developmentScore" placeholder="Development Score">

  <input id="livabilityScore" placeholder="Livability Score">

  <button onclick="addArea()">
    Add Area
  </button>

  <div class="success" id="msg"></div>

</div>


<h2>📍 Existing Areas</h2>

<div class="areas" id="areas"></div>


<script>

// LOAD AREAS
async function loadAreas() {

  try {

    const res = await fetch(
      "https://property-backend-pfil.onrender.com/api/area"
    );

    const data = await res.json();

    let html = "";

    data.forEach(area => {

      html += `

        <div class="card">

          <h3>${area.name}</h3>

          <div>📍 ${area.city}</div>

          <br>

          <div>💰 Price: ₹${area.basePrice}</div>

          <div>
            🧠 AI Data Available
          </div>

          <button
            class="delete-btn"
            onclick="deleteArea('${area._id}')">

            🗑 Delete

          </button>

        </div>
      `;
    });

    document.getElementById("areas").innerHTML =
      html;

  } catch (err) {

    console.error(err);
  }
}


// ADD AREA
async function addArea() {

  const data = {

    name:
      document.getElementById("name").value,

    city:
      document.getElementById("city").value,

    basePrice:
      Number(document.getElementById("basePrice").value),

    connectivityScore:
      Number(document.getElementById("connectivityScore").value),

    infrastructureScore:
      Number(document.getElementById("infrastructureScore").value),

    demandScore:
      Number(document.getElementById("demandScore").value),

    developmentScore:
      Number(document.getElementById("developmentScore").value),

    livabilityScore:
      Number(document.getElementById("livabilityScore").value)
  };

  try {

    const res = await fetch(
      "https://property-backend-pfil.onrender.com/api/add-area",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify(data)
      }
    );

    const result = await res.json();

    const msg =
      document.getElementById("msg");

    if (res.ok) {

      msg.style.color = "green";

      msg.innerText =
        "✅ Area Added Successfully";

      loadAreas();

    } else {

      msg.style.color = "red";

      msg.innerText =
        "❌ " + result.message;
    }

  } catch (err) {

    console.error(err);

    const msg =
      document.getElementById("msg");

    msg.style.color = "red";

    msg.innerText =
      "❌ Server Error";
  }
}


// DELETE AREA
async function deleteArea(id) {

  const confirmDelete =
    confirm("Delete this area?");

  if (!confirmDelete) return;

  try {

    await fetch(
      "https://property-backend-pfil.onrender.com/api/delete-area/" + id,
      {
        method: "DELETE"
      }
    );

    alert("Area deleted successfully");

    loadAreas();

  } catch (err) {

    console.error(err);

    alert("Delete failed");
  }
}


// START
loadAreas();

</script>

</body>
</html>
