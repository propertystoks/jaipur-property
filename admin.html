<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    input, select, button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>Admin Panel - Add Property Data</h2>

<input type="text" id="area" placeholder="Area Name">
<input type="number" id="price" placeholder="Price per sq ft">

<select id="trend">
  <option value="up">Increasing</option>
  <option value="down">Decreasing</option>
</select>

<button onclick="addData()">Add</button>

<script>
async function addData() {
  const area = document.getElementById("area").value;
  const price = document.getElementById("price").value;
  const trend = document.getElementById("trend").value;

  if (!area || !price) {
    alert("Please fill all fields");
    return;
  }

  try {
    const res = await fetch("https://property-backend-pfil.onrender.com/add", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        area: area,
        price: Number(price),
        trend: trend
      })
    });

    const data = await res.json();
    console.log(data);

    alert("Data added successfully!");
  } catch (error) {
    console.error(error);
    alert("Error connecting to backend");
  }
}
</script>

</body>
</html>
