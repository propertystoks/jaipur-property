<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
    input, select, button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>Admin Panel - Add Property Data</h2>

<input type="text" id="area" placeholder="Area Name">
<input type="number" id="price" placeholder="Price per sq ft">

<select id="trend">
  <option value="up">Increasing</option>
  <option value="down">Decreasing</option>
</select>

<button onclick="addData()">Add</button>

<script>
async function addData() {
  const area = document.getElementById("area").value;
  const price = document.getElementById("price").value;
  const trend = document.getElementById("trend").value;

  const newData = { area, price, trend };

  await fetch("https://property-backend-pfil.onrender.com/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(newData)
  });

  alert("Data added successfully!");
}
</script>

</body>
</html>
