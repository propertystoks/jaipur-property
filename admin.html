<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body>

<h2>Login</h2>
<input id="username" placeholder="Username"><br>
<input id="password" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>

<div id="panel" style="display:none;">
  <h2>Add Data</h2>
  <input id="area" placeholder="Area"><br>
  <input id="price" placeholder="Price"><br>

  <select id="trend">
    <option value="up">Increasing</option>
    <option value="down">Decreasing</option>
  </select><br>

  <button onclick="addData()">Add</button>
</div>

<script>
let token = "";

async function login() {
  const res = await fetch("https://property-backend-pfil.onrender.com/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if (data.token) {
    token = data.token;
    document.getElementById("panel").style.display = "block";
    alert("Login success");
  } else {
    alert("Login failed");
  }
}

async function addData() {
  await fetch("https://property-backend-pfil.onrender.com/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      area: document.getElementById("area").value,
      price: document.getElementById("price").value,
      trend: document.getElementById("trend").value
    })
  });

  alert("Added");
}
</script>

</body>
</html>
